
[functions.morning-concierge]
enabled = true
# Invoked by pg_cron with service_role Bearer (no end-user JWT)
verify_jwt = false
import_map = "./functions/morning-concierge/deno.json"
entrypoint = "./functions/morning-concierge/index.ts"

[functions.daily-class-reminder]
enabled = true
verify_jwt = false
import_map = "./functions/daily-class-reminder/deno.json"
entrypoint = "./functions/daily-class-reminder/index.ts"

[functions.send-session-reminder]
enabled = true
verify_jwt = false
import_map = "./functions/send-session-reminder/deno.json"
entrypoint = "./functions/send-session-reminder/index.ts"

[functions.notify-admin-events]
enabled = true
verify_jwt = true
import_map = "./functions/notify-admin-events/deno.json"
entrypoint = "./functions/notify-admin-events/index.ts"

[functions.notify-member-events]
enabled = true
verify_jwt = true
import_map = "./functions/notify-member-events/deno.json"
entrypoint = "./functions/notify-member-events/index.ts"

[functions.send-admin-alert]
enabled = true
verify_jwt = true
import_map = "./functions/send-admin-alert/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/send-admin-alert/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/send-admin-alert/*.html" ]
